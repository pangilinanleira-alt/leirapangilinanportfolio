<!DOCTYPE html>
<html>
<head>
<style>
table {
  border-collapse: collapse; 
  width: 60%;
  background-color: #f0f8ff; 
  margin: 20px auto; 
}

th, td {
  border: 2px solid #000;
  padding: 10px;           
  text-align: center;     
}

th {
  background-color: #add8e6; 
}

td:nth-child(odd) {
  background-color: #e6f2ff;
}
</style>
</head>

<body>

<table>
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>City</th>
  </tr>
  <tr>
    <td>Daphne</td>
    <td>25</td>
    <td>Manila</td>
  </tr>
  <tr>
    <td>Anthony</td>
    <td>30</td>
    <td>Cebu</td>
  </tr>
</table>

</body>
</html>
